# khost-managed CLIProxyAPI deployment.
#
# This file is a TEMPLATE. `khost proxy up` copies it into the runtime state dir
# ($KHOST_STATE_DIR/proxy) with @STATE_DIR@ substituted, then runs
# `docker compose up -d` from there. Volumes point at runtime paths, never the repo.
#
# Image is intentionally :latest (single host -> digest-pinning is moot).
# `khost proxy update` does `pull` THEN `up -d` so the running container is always
# recreated onto the pulled image (fixes pull-without-recreate drift).
# `khost proxy pin <digest>` rewrites the runtime copy to a fixed digest.
services:
  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    container_name: khost-cli-proxy-api
    ports:
      # Bind localhost only; local agents use this endpoint.
      - '127.0.0.1:8317:8317'
    volumes:
      - '@STATE_DIR@/config.yaml:/CLIProxyAPI/config.yaml'
      - '@STATE_DIR@/auths:/root/.cli-proxy-api'
      - '@STATE_DIR@/logs:/CLIProxyAPI/logs'
    restart: unless-stopped
