# Declarative list of public hostnames that route to this host through the
# khost Cloudflare Tunnel. Reconciled by `khost route sync` (and `khost up`).
#
# Each route becomes: tunnel ingress (hostname → service) + a proxied DNS CNAME
# + (when access: true) a self-hosted Access app gated by the `only-ernest`
# policy. The cliproxyapi on :8317 is intentionally NOT routed — it stays
# localhost-only for local agents.
routes:
  - hostname: kauto.ernest.atomi.cloud
    service: http://localhost:47317 # kautopilot dashboard

  - hostname: kloop.ernest.atomi.cloud
    service: http://localhost:47316 # kloop dashboard

  - hostname: ssh.ernest.atomi.cloud
    service: ssh://localhost:2222 # khost loopback sshd (browser-rendered via Access)

  - hostname: blog.ernest.atomi.cloud
    service: http://localhost:4321 # azide-boron blog dev server (Astro)
    access: true # gated to only-ernest
