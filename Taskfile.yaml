version: 3
tasks:
  delete-cycle:
    desc: Delete cycle
    cmds:
      - ./scripts/delete_cycle.sh

  update:
    desc: Update all
    cmds:
      - ./scripts/update_mac.sh
  update:beekeeper-studio:
    desc: Update Beekeeper Studio
    cmds:
      - ./scripts/updates/beekeeper-studio.sh
  # Secrets workflow: work on the DECRYPTED secrets.yaml (gitignored) —
  # decrypt only when it doesn't exist, re-encrypt only before committing.
  # The a-secrets-sync pre-commit hook blocks commits with unencrypted edits.
  secret:edit:
    desc: Edit the decrypted secrets working copy (decrypts first if missing)
    cmds:
      - ./scripts/secrets/decrypt.sh
      - '${EDITOR:-zed} ./secrets.yaml'
      - 'echo "Remember: pls secret:encrypt before committing"'
  secret:decrypt:
    desc: Decrypt secrets.enc.yaml -> secrets.yaml (only if it doesn't exist)
    cmds:
      - ./scripts/secrets/decrypt.sh
  secret:encrypt:
    desc: Re-encrypt secrets.yaml -> secrets.enc.yaml (skips when already in step)
    cmds:
      - ./scripts/secrets/encrypt.sh
  secret:check:
    desc: Verify secrets.enc.yaml is in step with secrets.yaml (pre-commit check)
    cmds:
      - ./scripts/secrets/check.sh

  box:up:
    desc: 'Provision a box (creds from sops) and optionally replicate: pls box:up -- <aws|digitalocean|oci> [--replicate] [profile]'
    cmds:
      - ./scripts/box/up.sh {{.CLI_ARGS}}
  box:down:
    desc: 'Destroy the provisioned box: pls box:down -- <aws|digitalocean|oci>'
    cmds:
      - ./scripts/box/down.sh {{.CLI_ARGS}}
  box:replicate:
    desc: 'Replicate this home-manager + Workspace repos onto a box: pls box:replicate -- user@host [profile]'
    cmds:
      - ./scripts/box/replicate.sh {{.CLI_ARGS}}
  box:login:
    desc: "Agent OAuth on the box: forwards codex's localhost callback (1455) over ssh — open the printed URL in YOUR browser"
    cmds:
      - ssh -t -L 1455:localhost:1455 box 'export PATH="$HOME/.nix-profile/bin:/nix/var/nix/profiles/default/bin:$PATH"; kfleet login'
  box:backup:
    desc: Trigger a backup on the box now (nightly timer runs it at 03:00 anyway)
    cmds:
      - ssh box '~/.local/bin/box-backup'
  box:gen-repos:
    desc: Regenerate the box clone manifest (.box.repos in secrets.yaml) from ~/Workspace
    cmds:
      - ./scripts/box/gen-repos.sh
