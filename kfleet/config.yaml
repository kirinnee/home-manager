# Account usage/login probing (kfleet usage + the `kfleet serve` background loop).
usage:
  interval: 300 # seconds between background re-probes (every 5 min, ±jitter)

profiles:
  claude:
    settings: ./templates/claude/settings.json
    skills: ./skills
    # KTEAM_MODEL is the default model kteam feeds via `--model` when a session is
    # started without an explicit override. Exported into every wrapper; inert for
    # normal CLI use (claude/codex ignore it), read only by kteam. Provider accounts
    # (glm52/mm3/deepseek) resolve the `opus` alias through their
    # ANTHROPIC_DEFAULT_OPUS_MODEL, so the alias stays correct per-account.
    env:
      KTEAM_MODEL: opus
  codex:
    settings: ./templates/codex/chatgpt.toml # base config.toml (layers merge on top)
    hooks: ./templates/codex/hooks.json
    skills: ./skills-codex
    # kfleet ships its own (vetted) hooks, so trust them without the per-project
    # trust prompt — required for the non-interactive auto wrappers.
    flags: ['--dangerously-bypass-hook-trust']
    # ChatGPT-backed codex has NO model aliases — bare "terra" 400s with
    # "model is not supported". Real catalog IDs on these accounts:
    # gpt-5.6-terra / gpt-5.6-sol / gpt-5.6-luna (+ gpt-5.5, gpt-5.4).
    env:
      KTEAM_MODEL: gpt-5.6-terra
  zai-a:
    env:
      ANTHROPIC_AUTH_TOKEN: $ZAI_API_KEY_A
      ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
  zai-b:
    env:
      ANTHROPIC_AUTH_TOKEN: $ZAI_API_KEY_B
      ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
  minimax:
    env:
      ANTHROPIC_AUTH_TOKEN: $MINIMAX_API_KEY
      ANTHROPIC_BASE_URL: https://api.minimax.io/anthropic
  deepseek:
    env:
      ANTHROPIC_AUTH_TOKEN: $DEEPSEEK_API_KEY
      ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
  # loge is now served by a LOCAL CLIProxyAPI (see `kloge`) at 127.0.0.1:8317 —
  # no gateway, no tailnet (the box isn't on the tailnet). Raw CLIProxyAPI does
  # NOT alias model names, so real upstream IDs are used (claude-fable-5, not
  # fable-5). Requires `kloge up` on whichever host runs these agents.
  loge:
    env:
      ANTHROPIC_API_KEY: loge-internal
      ANTHROPIC_BASE_URL: http://127.0.0.1:8317
      # Fable + Opus run with the 1M-token context beta (the `[1m]` model
      # suffix; verified end-to-end through CLIProxyAPI on 2026-07-22).
      # Sonnet/Haiku stay at their native windows.
      ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-8[1m]
      ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-5
      ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-haiku-4-5-20251001
      ANTHROPIC_DEFAULT_FABLE_MODEL: claude-fable-5[1m]
      KTEAM_MODEL: claude-fable-5[1m] # real ID: raw CLIProxyAPI has no aliases
    settings:
      model: claude-fable-5[1m]
  loge-codex:
    env:
      OPENAI_API_KEY: loge-internal
      KTEAM_MODEL: gpt-5.6-sol # frontier codex keeps its pinned model, not terra
    settings:
      model: gpt-5.6-sol
      model_reasoning_effort: ultra # sol is the diligent implementer; always run it at ultra
      model_provider: loge
      model_providers:
        loge:
          name: Loge
          base_url: http://127.0.0.1:8317/v1
          env_key: OPENAI_API_KEY
variants:
  default:
    memory: ./CLAUDE.md
    # Interactive codex runs on the "fast" service tier; the auto variant omits it
    # (codex default tier). Inline override deep-merges onto the codex profile's
    # base config.toml; kind-scoped so it never touches claude wrappers.
    codex:
      settings:
        service_tier: fast
  auto:
    memory: ./CLAUDE.auto.md
    # The server now marks default_service_tier=priority ("Fast", 1.5x speed,
    # increased usage) on some accounts' model catalogs, so merely omitting
    # service_tier no longer keeps auto lanes off the Fast tier. Pin them to
    # standard so fleet work doesn't silently burn increased usage.
    codex:
      settings:
        service_tier: standard
defaultHomes:
  claude: kirin
  codex: personal
# Cross-account session sharing: session state (transcripts, prompt history,
# checkpoints, plans) is pooled under ~/.kfleet/shared/<kind> and symlinked into
# every account home, so any account can `--resume` any session. Auth stays
# per-account. Existing history migrates into the pool on the next apply.
sharedHistory:
  claude: true
  codex: true
agents:
  # Anthropic-backed OAuth accounts: resolve the opus/fable aliases to the
  # 1M-context beta variants (`[1m]` suffix — verified live 2026-07-22).
  # Scoped per-agent, NOT on the shared claude profile, so provider-backed
  # accounts (glm52/mm3/deepseek) never see the suffix their APIs would 400 on.
  - name: kirin
    kind: claude
    profiles:
      - claude
    env: &anthropic-1m
      ANTHROPIC_DEFAULT_OPUS_MODEL: claude-opus-4-8[1m]
      ANTHROPIC_DEFAULT_FABLE_MODEL: claude-fable-5[1m]
  - name: liftoff
    kind: claude
    profiles:
      - claude
    env: *anthropic-1m
  - name: atomi
    kind: claude
    profiles:
      - claude
    env: *anthropic-1m
  - name: glm52a
    kind: claude
    profiles:
      - claude
      - zai-a
    env: &a1
      ANTHROPIC_DEFAULT_OPUS_MODEL: glm-5.2
      ANTHROPIC_DEFAULT_SONNET_MODEL: glm-5-turbo
      ANTHROPIC_DEFAULT_HAIKU_MODEL: glm-4.7
      ANTHROPIC_DEFAULT_FABLE_MODEL: glm-5.2
  - name: glm52b
    kind: claude
    profiles:
      - claude
      - zai-b
    env: *a1
  - name: mm3
    kind: claude
    profiles:
      - claude
      - minimax
    env:
      ANTHROPIC_DEFAULT_OPUS_MODEL: MiniMax-M3
      ANTHROPIC_DEFAULT_SONNET_MODEL: MiniMax-M3
      ANTHROPIC_DEFAULT_HAIKU_MODEL: MiniMax-M3
      ANTHROPIC_DEFAULT_FABLE_MODEL: MiniMax-M3
  - name: dsv4p
    kind: claude
    profiles:
      - claude
      - deepseek
    env:
      ANTHROPIC_DEFAULT_FABLE_MODEL: deepseek-v4-pro
      ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
      ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro
      ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-flash
  - name: dsv4f
    kind: claude
    profiles:
      - claude
      - deepseek
    env:
      ANTHROPIC_DEFAULT_FABLE_MODEL: deepseek-v4-pro
      ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
      ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-flash
      ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-flash
  - name: loge
    kind: claude
    profiles:
      - claude
      - loge
  - name: loge
    kind: codex
    profiles:
      - codex
      - loge-codex
  - name: loai
    kind: codex
    profiles:
      - codex
  - name: loio
    kind: codex
    profiles:
      - codex
  - name: ernest
    kind: codex
    profiles:
      - codex
  - name: kirin
    kind: codex
    profiles:
      - codex
  - name: atomi
    kind: codex
    profiles:
      - codex
  - name: personal
    kind: codex
    profiles:
      - codex
aliases:
  crc:
    claude: --dangerously-skip-permissions --chrome --rc
